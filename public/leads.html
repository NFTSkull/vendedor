<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leads — Mejoravit</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f6f8;
        --card: #ffffff;
        --text: #1a1d21;
        --muted: #5c6570;
        --border: #e2e6ea;
        --accent: #0d6efd;
        --accent-hover: #0b5ed7;
        --row-alt: #fafbfc;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      .wrap {
        max-width: 1080px;
        margin: 0 auto;
        padding: 2rem 1.25rem 3rem;
      }
      header {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-end;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      h1 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .sub {
        margin: 0.25rem 0 0;
        font-size: 0.9rem;
        color: var(--muted);
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      button {
        cursor: pointer;
        border: none;
        border-radius: 8px;
        padding: 0.55rem 1.1rem;
        font-size: 0.875rem;
        font-weight: 500;
        background: var(--accent);
        color: #fff;
        transition: background 0.15s ease;
      }
      button:hover:not(:disabled) {
        background: var(--accent-hover);
      }
      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        overflow: hidden;
      }
      .meta {
        padding: 0.75rem 1rem;
        font-size: 0.8rem;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
        background: var(--row-alt);
      }
      .table-wrap {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.875rem;
      }
      th,
      td {
        text-align: left;
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }
      th {
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        background: #fff;
      }
      tbody tr:nth-child(even) {
        background: var(--row-alt);
      }
      tbody tr:last-child td {
        border-bottom: none;
      }
      .nss {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 0.8rem;
      }
      .empty {
        padding: 2.5rem 1rem;
        text-align: center;
        color: var(--muted);
      }
      .err {
        padding: 1rem;
        color: #b02a37;
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div>
          <h1>Leads</h1>
          <p class="sub">Datos desde <code>leads.json</code></p>
        </div>
        <div class="toolbar">
          <button type="button" id="btnReload">Recargar</button>
        </div>
      </header>

      <div class="card">
        <div class="meta" id="meta">Cargando…</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>waId</th>
                <th>NSS</th>
                <th>Fecha</th>
                <th>Mensajes</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div class="empty" id="empty" hidden>No hay leads registrados.</div>
        <div class="err" id="err" hidden></div>
      </div>
    </div>

    <script>
      const tbody = document.getElementById("tbody");
      const meta = document.getElementById("meta");
      const empty = document.getElementById("empty");
      const errEl = document.getElementById("err");
      const btnReload = document.getElementById("btnReload");

      function countMensajes(lead) {
        if (!lead || !Array.isArray(lead.mensajes)) return 0;
        return lead.mensajes.length;
      }

      function clearTable() {
        tbody.replaceChildren();
      }

      async function loadLeads() {
        errEl.hidden = true;
        errEl.textContent = "";
        empty.hidden = true;
        btnReload.disabled = true;
        meta.textContent = "Cargando…";
        clearTable();

        try {
          const res = await fetch("/api/leads", { cache: "no-store" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const data = await res.json();
          const list = Array.isArray(data) ? data : [];

          const now = new Date();
          meta.textContent =
            list.length +
            " lead" +
            (list.length === 1 ? "" : "s") +
            " · Actualizado " +
            now.toLocaleString("es-MX", { dateStyle: "short", timeStyle: "short" });

          if (list.length === 0) {
            empty.hidden = false;
            return;
          }

          for (let i = list.length - 1; i >= 0; i--) {
            const lead = list[i];
            const tr = document.createElement("tr");
            const tdWa = document.createElement("td");
            tdWa.textContent = lead.waId ?? "";
            const tdNss = document.createElement("td");
            tdNss.className = "nss";
            tdNss.textContent = lead.nss ?? "";
            const tdFecha = document.createElement("td");
            tdFecha.textContent = lead.fecha ?? "";
            const tdNum = document.createElement("td");
            tdNum.textContent = String(countMensajes(lead));
            tr.append(tdWa, tdNss, tdFecha, tdNum);
            tbody.appendChild(tr);
          }
        } catch (e) {
          meta.textContent = "Error al cargar";
          errEl.textContent = "No se pudieron obtener los datos. " + (e && e.message ? e.message : "");
          errEl.hidden = false;
        } finally {
          btnReload.disabled = false;
        }
      }

      btnReload.addEventListener("click", loadLeads);
      loadLeads();
    </script>
  </body>
</html>
