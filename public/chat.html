<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Chat — Prueba bot</title>
    <style>
      :root {
        --bg: #eceff1;
        --header: #075e54;
        --header-text: #fff;
        --bubble-user: #dcf8c6;
        --bubble-bot: #ffffff;
        --bubble-border: rgba(0, 0, 0, 0.06);
        --text: #111b21;
        --muted: #667781;
        --input-bg: #fff;
        --accent: #128c7e;
        --accent-hover: #0f7a6e;
        --danger: #c62828;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .app {
        height: 100%;
        max-width: 520px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        background: linear-gradient(180deg, #dde5e8 0%, #eceff1 28%);
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.04);
      }
      header {
        flex: 0 0 auto;
        padding: 0.85rem 1rem;
        background: var(--header);
        color: var(--header-text);
        display: flex;
        align-items: center;
        gap: 0.65rem;
      }
      .avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        display: grid;
        place-items: center;
        font-weight: 600;
        font-size: 0.85rem;
      }
      .title {
        flex: 1;
        min-width: 0;
      }
      .title h1 {
        margin: 0;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .title p {
        margin: 0.1rem 0 0;
        font-size: 0.75rem;
        opacity: 0.9;
      }
      #thread {
        flex: 1 1 auto;
        overflow-y: auto;
        padding: 0.75rem 0.75rem 5.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }
      .row {
        display: flex;
        width: 100%;
      }
      .row.user {
        justify-content: flex-end;
      }
      .row.bot {
        justify-content: flex-start;
      }
      .bubble {
        max-width: 82%;
        padding: 0.45rem 0.65rem 0.5rem;
        border-radius: 10px;
        font-size: 0.9rem;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
        box-shadow: 0 1px 0.5px var(--bubble-border);
      }
      .bubble.user {
        background: var(--bubble-user);
        border-top-right-radius: 2px;
      }
      .bubble.bot {
        background: var(--bubble-bot);
        border-top-left-radius: 2px;
      }
      .bubble.err {
        background: #ffebee;
        color: var(--danger);
        border: 1px solid rgba(198, 40, 40, 0.2);
      }
      .meta {
        font-size: 0.65rem;
        color: var(--muted);
        margin-top: 0.2rem;
        text-align: right;
      }
      .row.bot .meta {
        text-align: left;
      }
      footer {
        position: sticky;
        bottom: 0;
        flex: 0 0 auto;
        padding: 0.5rem 0.65rem calc(0.5rem + env(safe-area-inset-bottom, 0));
        background: rgba(236, 239, 241, 0.92);
        backdrop-filter: blur(8px);
        border-top: 1px solid rgba(0, 0, 0, 0.06);
      }
      form {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }
      input[type="text"] {
        flex: 1;
        min-width: 0;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 24px;
        padding: 0.65rem 1rem;
        font-size: 0.9rem;
        outline: none;
        background: var(--input-bg);
      }
      input[type="text"]:focus {
        border-color: rgba(18, 140, 126, 0.45);
        box-shadow: 0 0 0 3px rgba(18, 140, 126, 0.12);
      }
      button[type="submit"] {
        border: none;
        border-radius: 24px;
        padding: 0.65rem 1.1rem;
        font-size: 0.875rem;
        font-weight: 600;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      button[type="submit"]:hover:not(:disabled) {
        background: var(--accent-hover);
      }
      button[type="submit"]:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="avatar">B</div>
        <div class="title">
          <h1>Bot Mejoravit</h1>
          <p>Prueba vía <code>/test</code> · waId <strong>demo</strong></p>
        </div>
      </header>
      <main id="thread" aria-live="polite"></main>
      <footer>
        <form id="chatForm" autocomplete="off">
          <input type="text" id="msgInput" placeholder="Escribe un mensaje…" maxlength="4000" required />
          <button type="submit" id="btnSend">Enviar</button>
        </form>
      </footer>
    </div>

    <script>
      const thread = document.getElementById("thread");
      const form = document.getElementById("chatForm");
      const input = document.getElementById("msgInput");
      const btnSend = document.getElementById("btnSend");

      const WA_ID = "demo";

      function scrollBottom() {
        thread.scrollTop = thread.scrollHeight;
      }

      function timeLabel() {
        return new Date().toLocaleTimeString("es-MX", { hour: "2-digit", minute: "2-digit" });
      }

      function addBubble(role, text, extraClass) {
        const row = document.createElement("div");
        row.className = "row " + (role === "user" ? "user" : "bot");
        const wrap = document.createElement("div");
        wrap.style.maxWidth = "100%";
        const b = document.createElement("div");
        b.className = "bubble " + (role === "user" ? "user" : "bot") + (extraClass ? " " + extraClass : "");
        b.textContent = text;
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = timeLabel();
        wrap.appendChild(b);
        wrap.appendChild(meta);
        row.appendChild(wrap);
        thread.appendChild(row);
        scrollBottom();
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const texto = input.value.trim();
        if (!texto) return;

        addBubble("user", texto);
        input.value = "";
        btnSend.disabled = true;
        input.disabled = true;

        try {
          const res = await fetch("/test", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ waId: WA_ID, texto })
          });
          const raw = await res.text();
          let data = null;
          try {
            data = raw ? JSON.parse(raw) : null;
          } catch {
            data = null;
          }
          if (!res.ok) {
            const msg = data && data.error ? String(data.error) : raw || "Error " + res.status;
            addBubble("bot", msg, "err");
            return;
          }
          if (data && typeof data.respuesta === "string") {
            addBubble("bot", data.respuesta);
          } else {
            addBubble("bot", "Respuesta inválida del servidor.", "err");
          }
        } catch (err) {
          addBubble("bot", "No se pudo conectar al servidor.", "err");
        } finally {
          btnSend.disabled = false;
          input.disabled = false;
          input.focus();
        }
      });

      input.focus();
    </script>
  </body>
</html>
